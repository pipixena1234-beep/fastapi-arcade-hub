<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dice Tag Royale</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] {
            display: none;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-bar {
            height: 4px;
            background: #ef4444;
            width: 100%;
            transition: width 10s linear;
        }

        .timer-empty {
            width: 0% !important;
        }

        .die {
            transition: transform 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .rolling {
            animation: spin 0.6s infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

<!-- 1. JINJA2 RAW TAG: Prevents server-side crash -->
{% raw %}
<div id="app" v-cloak class="w-full max-w-md space-y-6">

    <!-- Welcome Screen -->
    <div v-if="!joined" class="glass p-8 rounded-3xl space-y-4">
        <h1 class="text-3xl font-black italic text-cyan-400">DICE TAG ROYALE</h1>
        <input v-model="name" placeholder="Enter Nickname"
               class="w-full bg-black/40 border border-slate-800 p-4 rounded-xl outline-none focus:border-cyan-500">
        <div class="grid grid-cols-6 gap-2">
            <button v-for="n in 6" @click="tag = n"
                    :class="tag === n ? 'bg-cyan-500 border-cyan-400' : 'bg-slate-800 border-slate-700'"
                    class="p-3 border rounded-lg font-bold transition">
                {{n}}
            </button>
        </div>
        <button @click="joinGame"
                class="w-full bg-white text-black p-4 rounded-xl font-black hover:bg-cyan-400 transition">ENTER ARENA
        </button>
    </div>

    <!-- Gameplay Screen -->

    <div v-else class="space-y-6">
        <!-- Header Row: Profile on Left, Timer on Right -->
        <div class="flex justify-between items-start">
        <!-- 1. Player Profile Header (Top Left) -->
        <div class="flex items-center gap-4 mb-6 p-1">
            <div class="relative">
                <!-- The Player's Dice Tag Icon -->
                <div :style="{ backgroundColor: myColor }"
                     class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl font-black shadow-lg border border-white/20">
                    {{ tag }}
                </div>
                <!-- Status Indicator -->
                <div class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-500 border-4 border-slate-950 rounded-full"></div>
            </div>

            <div class="text-left">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em]">Active Operative</h2>
                <div class="flex items-center gap-2">
                    <span class="text-xl font-black italic tracking-tighter uppercase">{{ name }}</span>
                    <span class="text-[10px] bg-slate-800 px-2 py-0.5 rounded font-mono text-cyan-400">#{{ tag }}</span>
                </div>
            </div>
        </div>

        <div class="text-right">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Time Remaining</p>
            <!-- Changes to red when under 10 seconds -->
            <div :class="matchTime <= 10 ? 'text-red-500 animate-pulse' : 'text-cyan-400'"
                 class="text-3xl font-mono font-bold">
                {{ matchTime }}s
            </div>
        </div>
</div>
        <!-- Leaderboard -->
        <div class="glass p-6 rounded-3xl">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center mb-4">Top
                Rankings</h2>
            <div class="space-y-2">
                <div v-for="(p, i) in leaderboard" :key="p.name"
                     class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <span class="text-lg">{{ i == 0 ? '👑' : i + 1 }}</span>
                        <span class="font-bold">{{p.name}} <small
                                class="text-cyan-400 opacity-50">#{{p.tag}}</small></span>
                        <span v-if="p.shield_active" class="text-blue-400 animate-pulse">🛡️</span>
                    </div>
                    <span class="text-xl font-black">{{p.score}}</span>
                </div>
            </div>
        </div>

        <!-- Sabotage Timer & Buttons -->
        <div v-if="votingActive"
             class="bg-red-950/30 border border-red-500/50 rounded-2xl overflow-hidden shadow-[0_0_25px_rgba(239,68,68,0.2)]">
            <div :class="['timer-bar', { 'timer-empty': startTimer }]"></div>
            <div class="p-4 text-center">
                <h3 class="text-red-500 font-black tracking-widest animate-pulse uppercase">Sabotage Phase!</h3>
                <div class="flex gap-2 mt-4">
                    <button v-for="l in leaderboard"
                            @click="vote(l.name)"
                            :disabled="l.name === name"
                            :class="l.name === name ? 'opacity-20 grayscale' : 'bg-red-600 hover:bg-red-500'"
                            class="flex-1 p-2 rounded-xl text-[10px] font-black transition uppercase">
                        {{ l.name === name ? 'YOU' : 'HIT ' + l.name }}
                    </button>
                </div>
            </div>
        </div>

        <!-- Dice Roll Area -->
        <div class="glass p-8 rounded-3xl text-center space-y-4">
            <div class="flex justify-center">
                <div :class="['die flex items-center justify-center text-5xl font-black rounded-[2rem] shadow-[0_0_30px_rgba(8,145,178,0.3)]', {rolling: isRolling}]"
                     :style="{  backgroundColor: activeDiceColor,
                                width: '120px',
                                height: '120px',
                                borderRadius: '32px',
                                fontSize: '72px',
                                lineHeight: '1',
                                boxShadow: '0 10px 40px ' + activeDiceColor + '66'}">
                    {{ currentRoll }}
                </div>
            </div>
            <p class="text-sm italic text-slate-400 min-h-[40px]">{{ lastMsg }}</p>
            <!-- REMOVED votingActive from the disabled condition -->
            <button @click="roll"
                    :disabled="isRolling"
                    class="w-full bg-cyan-600 p-5 rounded-2xl font-black text-xl active:scale-95 transition disabled:opacity-30">
                {{ votingActive ? 'REPAIR SHIELD' : 'ROLL DICE' }}
            </button>
        </div>
    </div>
</div>
{% endraw %}

<script>
    const {createApp} = Vue;
    createApp({
        data() {
            return {
                ws: null, joined: false, name: '', tag: 1,
                leaderboard: [], currentRoll: '?', lastMsg: 'Wait for players...',
                isRolling: false, votingActive: false, startTimer: false,
                matchTime: '0.0',
                myColor: '#0891b2',      // Your personal profile color
                activeDiceColor: '#0891b2' // The color of the dice in the middle
            }
        },
        methods: {
            joinGame() {
                if (!this.name) return;
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                // 2. UPDATED PATH: Added /dice/ to match your router prefix
                this.ws = new WebSocket(`${protocol}//${window.location.host}/dice/ws`);

                this.ws.onopen = () => {
                    this.ws.send(JSON.stringify({name: this.name, tag: this.tag}));
                    this.joined = true;
                };
                this.ws.onmessage = (e) => {
                    const d = JSON.parse(e.data);

                    // Set the unique color assigned by the server
                    if (d.type === 'init') {
                        this.myColor = d.color;
                        this.activeDiceColor = d.color; // Start with your color
                    }

                    // Inside your onmessage handler
                    if (d.remaining !== undefined) {
                        this.matchTime = d.remaining;
                    }

                    if (d.type === 'game_over') {
                        this.votingActive = false;
                        this.isRolling = false;
                        this.lastMsg = d.msg;
                        alert("FINAL WHISTLE: " + d.msg);
                    }

                    if (d.type === 'roll_result') {
                        this.isRolling = true;
                        // 2. Change ONLY the arena dice color to the roller's color
                        if (d.active_color) {
                            this.activeDiceColor = d.active_color;
                        }
                        setTimeout(() => {
                            this.isRolling = false;
                            this.currentRoll = d.roll;
                            this.lastMsg = d.msg;
                            this.leaderboard = d.leaderboard;
                            this.votingActive = d.voting_active;
                            if (d.voting_active) {
                                this.startTimer = false;
                                setTimeout(() => this.startTimer = true, 50);
                            }
                        }, 600);
                    }
                    if (d.type === 'msg') this.lastMsg = d.text;
                    if (d.type === 'leaderboard_update') this.leaderboard = d.leaderboard;
                    if (d.type === 'voting_ended') {
                        this.votingActive = false;
                        this.startTimer = false;
                        this.leaderboard = d.leaderboard;
                        this.lastMsg = "Sabotage ended! Game back on.";
                    }
                };
            },
            roll() {
                this.ws.send(JSON.stringify({type: 'roll'}));
            },
            vote(name) {
                this.ws.send(JSON.stringify({type: 'vote_down', target: name}));
            }
        }
    }).mount('#app')
</script>
</body>
</html>
