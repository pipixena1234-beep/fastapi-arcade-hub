<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUG OF WAR | LOBBY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style></style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="bg-lines"></div>

    <div class="w-full max-w-md glass-card rounded-[2rem] p-10 space-y-10 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-blue-500 opacity-50"></div>
        <div class="absolute top-0 right-0 w-1 h-full bg-red-500 opacity-50"></div>

        <div class="text-center space-y-2">
            <h1 class="text-6xl font-black tracking-tighter italic leading-none">
                <span class="text-blue-500 glow-blue">TUG</span><br>
                <span class="text-red-500 glow-red">OF WAR</span>
            </h1>
            <p class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold">Battle for the Centerline</p>
        </div>

        <div class="space-y-6">
            <div class="group">
                <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2 mb-2 block">Operative Name</label>
                <input id="player-name" type="text" placeholder="GHOST_OPERATOR"
                    class="w-full bg-slate-950/50 border border-slate-800 p-4 rounded-2xl focus:ring-2 ring-blue-500 outline-none transition-all input-focus-effect font-mono placeholder:opacity-30">
            </div>

            <div class="pt-6 border-t border-slate-800/50 space-y-4">
                <button onclick="nav('host')"
                    class="btn-hover w-full bg-slate-100 text-slate-950 font-black p-4 rounded-2xl flex items-center justify-center gap-2 group">
                    <span>CREATE ARENA</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </button>

                <div class="flex gap-3">
                    <input id="join-id" type="text" maxlength="6" placeholder="ID"
                        class="w-24 bg-slate-950/50 border border-slate-800 p-4 rounded-2xl uppercase text-center font-mono font-bold focus:ring-2 ring-emerald-500 outline-none transition-all">

                    <button onclick="nav('player')"
                        class="btn-hover flex-1 bg-emerald-600 hover:bg-emerald-500 font-black p-4 rounded-2xl shadow-lg shadow-emerald-900/20">
                        JOIN MISSION
                    </button>
                </div>
            </div>
        </div>

        <footer class="text-center">
            <span class="text-[9px] font-mono text-slate-600 uppercase tracking-widest">v2.0 // Neural Link Active</span>
        </footer>
    </div>

    <script></script>
</body>
</html>
    <script>
        async function nav(type) {
            const nameInput = document.getElementById('player-name');
            const joinInput = document.getElementById('join-id');

            const name = nameInput.value || "ANON_" + Math.floor(Math.random() * 999);
            const gameId = joinInput.value.toUpperCase();

            if (type === 'host') {
                try {
                    // 1. Tell the server to initialize a new game
                    const res = await fetch('/tow/create', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({target_n: 20})
                    });
                    const data = await res.json();

                    // 2. Redirect using the IDs generated by the server
                    window.location.href = `/tow/host?game_id=${data.game_id}&client_id=${data.host_id}`;
                } catch (err) {
                    alert("Failed to initialize arena.");
                }
            } else {
                if (!gameId) {
                    triggerError(joinInput);
                    return;
                }

                try {
                    // 1. Tell the server a new player wants to join
                    const response = await fetch(`/tow/${gameId}/join`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({name: name})
                    });

                    if (response.ok) {
                        const data = await response.json();
                        // 2. Redirect with the player_id assigned by the server
                        window.location.href = `/tow/player?game_id=${data.game_id}&client_id=${data.player_id}`;
                    } else {
                        triggerError(joinInput);
                        joinInput.value = "";
                        joinInput.placeholder = "404";
                    }
                } catch (err) {
                    console.error("Neural Link Failure:", err);
                    alert("Connection to server lost.");
                }
            }
        }

        function triggerError(el) {
            el.classList.add('ring-2', 'ring-red-500');
            el.animate([
                {transform: 'translateX(0)'},
                {transform: 'translateX(-5px)'},
                {transform: 'translateX(5px)'},
                {transform: 'translateX(0)'}
            ], {duration: 100, iterations: 3});
            setTimeout(() => el.classList.remove('ring-red-500'), 2000);
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #0f172a 0%, #020617 100%);
        }

        /* Animated background "Rope" lines */
        .bg-lines {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: repeating-linear-gradient(45deg, #1e293b 0, #1e293b 1px, transparent 0, transparent 50%);
            background-size: 40px 40px;
            opacity: 0.1;
            animation: slide 20s linear infinite;
        }

        @keyframes slide {
            from { background-position: 0 0; }
            to { background-position: 400px 400px; }
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-focus-effect:focus {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        .btn-hover {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-hover:active { transform: scale(0.95); }

        .glow-blue { text-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .glow-red { text-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
    </style>
